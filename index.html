<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Attendance</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Google</h1>
      <p><b>Attendance Dashboard</b></p>
    </header>
  </div><p>
    <section>
      <h2>Employee Attendance Form</h2><p></p>
      <form id="attendanceForm">
        <div>
          <label>Employee ID</label>
          <input type="text" id="employeeId" placeholder="Enter employee ID" />
        </div>

        <div>
          <label>Employee Name</label>
          <input type="text" id="employeeName" placeholder="Enter employee name" />
        </div>

        <div>
          <label>Department</label>
          <select id="department">
            <option value="">Select Department</option>
            <option>HR</option>
            <option>IT</option>
            <option>Finance</option>
            <option>Sales</option>
          </select>
        </div>

        <div>
          <label>Working Days</label>
          <input type="number" id="workingDays" placeholder="Enter working days" />
        </div>

        <div>
          <label>Present Days</label>
          <input type="number" id="presentDays" placeholder="Enter present days" />
        </div>

        <div>
          <label>Leave Days</label>
          <input type="number" id="leaveDays" placeholder="Enter leave days" />
        </div>

        <div class="full-width">
          <button type="submit">Submit</button>
        </div>
      </form>
    </section><p></p>

    <section>
      <h2>Attendance Report</h2>
      <table>
        <thead>
          <tr>
            <th>Employee ID</th>
            <th>Employee Name</th>
            <th>Department</th>
            <th>Working Days</th>
            <th>Present Days</th>
            <th>Leave Days</th>
          </tr>
        </thead>
        <tbody id="attendanceTableBody">
          <tr>
            <td>100</td>
            <td>Nikash</td>
            <td>IT</td>
            <td>22</td>
            <td>20</td>
            <td>2</td>
          </tr>
          <tr>
            <td>101</td>
            <td>Gokul</td>
            <td>HR</td>
            <td>22</td>
            <td>21</td>
            <td>1</td>
          </tr>
          <tr>
            <td>102</td>
            <td>Suriya</td>
            <td>Finance</td>
            <td>22</td>
            <td>19</td>
            <td>3</td>
          </tr>
          <tr>
            <td>103</td>
            <td>Sanjeev</td>
            <td>Sales</td>
            <td>22</td>
            <td>22</td>
            <td>0</td>
          </tr>
          <tr>
            <td>104</td>
            <td>Praveen Kanth</td>
            <td>IT</td>
            <td>22</td>
            <td>18</td>
            <td>4</td>
          </tr>
        </tbody>
      </table>
    </section>
  </div>
  <script src="./emp.js" defer></script>
</body>
</html>
